name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Windows Release
    runs-on: windows-latest


    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🌟 核心破局点：在云端虚拟机里把锁死 gnu 的本地配置文件删掉！
      # 这样既不会影响你本地的硬盘文件，又能让云端摆脱 gnu 的幽灵束缚
      - name: Clear local toolchain override on CI
        run: |
          if (Test-Path "src-tauri/rust-toolchain.toml") { Remove-Item "src-tauri/rust-toolchain.toml" -Force }
        shell: pwsh

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 显式安装云端编译所需的 msvc 工具链
      - name: Setup Stable Rust MSVC Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies (strict)
        run: npm ci

      # 编译打包，此时云端的 rust-toolchain 已经被删干净了，默认听 msvc 的话
      - name: Build Tauri bundle & publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "diffWatch ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            自动构建产物 —— Windows 安装包与绿色版。

            ⚠️ 草稿状态，请人工核验后再发布。
          args: --target x86_64-pc-windows-msvc